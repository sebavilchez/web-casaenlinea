<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SISTEMA CANON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #262626;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-top: 4px solid #ff6600;
        }
        h1 {
            color: #ff6600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #cccccc;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BIENVENIDO AL DASHBOARD</h1>
        <p>SISTEMA CANON — Panel de Control de Infraestructura</p>
    </div>

</body>
</html>
