<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cámara en vivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh;">

  <video id="video" autoplay controls muted playsinline
         style="width:100%; max-width:900px; background:black;">
  </video>

  <script>
    const video = document.getElementById("video");

    const streamUrl = "http://186.127.70.226:1984/api/stream.m3u8?src=hik";

    // HLS nativo (Safari / algunos móviles)
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
    } else {
      // Chrome / Edge
      import("https://cdn.jsdelivr.net/npm/hls.js@latest").then(({ default: Hls }) => {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(streamUrl);
          hls.attachMedia(video);
        } else {
          alert("HLS no soportado en este navegador");
        }
      });
    }
  </script>

</body>
</html>
