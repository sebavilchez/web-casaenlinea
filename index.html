<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cámara en vivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black; display:flex; justify-content:center; align-items:center; height:100vh;">

  <video id="video" autoplay playsinline controls style="width:100%; max-width:1000px;"></video>

  <script>
    const video = document.getElementById("video");

    const pc = new RTCPeerConnection();

    pc.ontrack = (event) => {
      video.srcObject = event.streams[0];
    };

    // IMPORTANTE: usar tu dominio Cloudflare, no IP
    const ws = new WebSocket("wss://cams.casaenlinea.com.ar/ws?src=hik");

    ws.onmessage = async (msg) => {
      const data = JSON.parse(msg.data);

      if (data.sdp) {
        await pc.setRemoteDescription(data.sdp);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ sdp: pc.localDescription }));
      }

      if (data.candidate) {
        await pc.addIceCandidate(data.candidate);
      }
    };
  </script>

</body>
</html>
