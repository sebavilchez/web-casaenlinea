<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cámara en vivo</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* Indicador LIVE */
#live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 6px;
  z-index: 10;
}

/* Loading */
#status {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  font-size: 12px;
  opacity: 0.7;
  z-index: 10;
}
</style>
</head>

<body>

<div id="live">● LIVE</div>
<div id="status">Conectando...</div>

<video id="video" autoplay playsinline muted></video>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");

// 🔧 AJUSTA ESTO si cambia tu cámara
const streamName = "hik";

// 🔁 Endpoint típico go2rtc moderno
const webrtcUrl = "https://cams.casaenlinea.com.ar/api/webrtc?src=" + streamName;

// fallback (tu método actual que ya funciona)
const fallbackUrl = "https://cams.casaenlinea.com.ar/stream.html?src=" + streamName + "&mode=webrtc";

async function startWebRTC() {
  try {
    status.textContent = "Conectando WebRTC...";

    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    pc.ontrack = (event) => {
      video.srcObject = event.streams[0];
      status.textContent = "En vivo";
    };

    pc.addTransceiver("video", { direction: "recvonly" });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const response = await fetch(webrtcUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(pc.localDescription)
    });

    if (!response.ok) throw new Error("WebRTC fallback");

    const answer = await response.json();
    await pc.setRemoteDescription(answer);

    return true;
  } catch (e) {
    console.log("Fallback a stream.html", e);
    return false;
  }
}

async function start() {
  const ok = await startWebRTC();

  if (!ok) {
    status.textContent = "Usando modo fallback...";
    video.src = fallbackUrl;
  }
}

start();
</script>

</body>
</html>
