<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    <div>
        <label>Usuario</label><br>
        <input type="text" id="usuario">
    </div>
    <br>
    <div>
        <label>Contraseña</label><br>
        <input type="password" id="password">
    </div>
    <br>
    <button id="btn-login" onclick="login()">Ingresar</button>

    <script>
        async function login() {
            const btn = document.getElementById("btn-login");
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            if(!usuario || !password) {
                alert("Completa ambos campos");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
                const response = await fetch("TU_URL_DEL_SCRIPT_AQUI", {
                    method: "POST",
                    mode: "no-cors", // Nota: Esto puede variar según tu configuración de GAS
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usuario, password })
                });

                // Como usamos no-cors por política de Google, asumimos éxito si llega respuesta
                alert("Verificando credenciales...");
            } catch (error) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerText = "Ingresar";
            }
        }
    </script>
</body>
</html>
