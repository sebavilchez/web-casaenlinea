<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    <div>
        <label>Usuario</label><br>
        <input type="text" id="usuario">
    </div>
    <br>
    <div>
        <label>Contraseña</label><br>
        <input type="password" id="password">
    </div>
    <br>
    <button id="btn-login" onclick="login()">Ingresar</button>

    <script>
        async function login() {
            const btn = document.getElementById("btn-login");
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            if(!usuario || !password) {
                alert("Completa ambos campos");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbziIh_yILSim-IJqImQRnD1hGXSmS0OIPIt6X1ubIHf3_-czzOqm4r23rrsg6iOV-S7GQ/exec", {
        method: "POST",
        // Quitamos "mode: no-cors"
        headers: { 
            "Content-Type": "application/json" 
        },
        body: JSON.stringify({ usuario, password })
    });

    const data = await response.json(); // Ahora sí podemos leer la respuesta

    if (data.status === "ok") {
        alert("Usuario autorizado");
    } else {
        alert("Usuario no autorizado");
    }

} catch (error) {
    console.error("Error:", error);
    alert("Error de conexión");
}
            } finally {
                btn.disabled = false;
                btn.innerText = "Ingresar";
            }
        }
    </script>
</body>
</html>
