<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h2>Iniciar Sesión</h2>
    <input type="text" id="usuario" placeholder="CUIT del Cliente">
    <input type="password" id="password" placeholder="Contraseña">
    
    <button id="btn-login">Ingresar</button>

    <script>
        // 1. Inicialización
        const supabaseUrl = 'https://kjvolmxopztielrlhzqg.supabase.co';
        const supabaseKey = 'sb_publishable_0i-ymg_0Ala-0ZQBFbwHhw_H49Mzhqz';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Función de Login
        async function login() {
            const btn = document.getElementById("btn-login");
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            if (!usuario || !password) {
                alert("Completa ambos campos");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                const { data, error } = await supabase
                    .from('clientes')
                    .select('*')
                    .eq('cliente_cuit', usuario)
                    .eq('cliente_clave', password);

                if (error) throw error;

                if (data && data.length > 0) {
                    alert("¡Acceso autorizado!");
                } else {
                    alert("CUIT o contraseña incorrectos.");
                }
            } catch (err) {
                console.error("Error:", err);
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Ingresar";
            }
        }

        // 3. ESTA ES LA CLAVE: Asignamos el evento aquí abajo
        document.getElementById("btn-login").addEventListener("click", login);
    </script>
</body>
</html>
