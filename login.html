<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Casa en Línea</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0051b3; }
        #salida { margin-top: 15px; font-size: 0.9rem; color: #d00; text-align: center; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="userInput" placeholder="CUIT (ej: 20123456789)">
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="enviar()">Ingresar</button>
        <pre id="salida"></pre>
    </div>

    <script>
        async function enviar() {
            const user = document.getElementById('userInput').value;
            const password = document.getElementById('passInput').value;
            const salida = document.getElementById('salida');

            salida.innerText = "Conectando...";

            try {
                // Cambia esto en tu login.html
const response = await fetch('/api/validar', {
    method: 'POST', // Esto es clave
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cuit: user, clave: password })
});

                const data = await response.json();

                if (response.ok) {
                    // Si el servidor responde 200 OK
                    localStorage.setItem('datosCliente', JSON.stringify(data.cliente));
                    window.location.href = 'dashboard.html';
                } else {
                    // Si el servidor responde un error (401)
                    salida.innerText = data.message || "Error al autenticar";
                }
            } catch (error) {
                salida.innerText = "Error de red: No se pudo conectar con el servidor.";
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
