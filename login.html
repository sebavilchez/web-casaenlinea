<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        input { margin: 5px; padding: 10px; width: 250px; }
        button { margin: 10px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Login</h2>
    <input type="text" id="cuit" placeholder="CUIT">
    <input type="password" id="clave" placeholder="Contraseña">
    <button id="btn-login">Ingresar</button>
    <p id="mensaje"></p>

    <script>
        // 2. Definimos la constante UNA SOLA VEZ
        const supabaseUrl = 'https://kjvolmxopztielrlhzqg.supabase.co';
        const supabaseKey = 'sb_publishable_JiDU8QzJFxgWJ1iH6S7QBA_rbikwSJG';
        
        // 3. Inicializamos el cliente
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('btn-login').addEventListener('click', async () => {
            const cuit = document.getElementById('cuit').value;
            const clave = document.getElementById('clave').value;
            const msg = document.getElementById('mensaje');

            msg.innerText = "Conectando...";

            try {
                const { data, error } = await supabase
                    .from('clientes')
                    .select('id')
                    .eq('cliente_cuit', cuit)
                    .eq('cliente_clave', clave);

                if (error) throw error;

                if (data && data.length > 0) {
                    msg.innerText = "✅ ¡Acceso Autorizado!";
                } else {
                    msg.innerText = "❌ Datos incorrectos.";
                }
            } catch (err) {
                msg.innerText = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
